<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Professor enfadat</title>
  <desc id="desc">Primer pla fosc de la cara del professor amb els ulls oberts mirant de front.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="48%" r="70%">
      <stop offset="0%" stop-color="#3d241d"/>
      <stop offset="52%" stop-color="#1a0f10"/>
      <stop offset="100%" stop-color="#040404"/>
    </radialGradient>
    <radialGradient id="skin" cx="48%" cy="46%" r="52%">
      <stop offset="0%" stop-color="#7f5448"/>
      <stop offset="58%" stop-color="#4b2d27"/>
      <stop offset="100%" stop-color="#1d1213"/>
