function roundedRectPath(x, y, w, h, r) {
  const rr = Math.max(0, Math.min(r, w * 0.5, h * 0.5));
  ctx.beginPath();
  ctx.moveTo(x + rr, y);
  ctx.lineTo(x + w - rr, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
  ctx.lineTo(x + w, y + h - rr);
  ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
  ctx.lineTo(x + rr, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
  ctx.lineTo(x, y + rr);
  ctx.quadraticCurveTo(x, y, x + rr, y);
  ctx.closePath();
}

let AC = null;
let muted = false;

function ac() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  return AC;
}

function synth(freqStart, freqEnd, type, duration, volume) {
  if (muted) return;
  try {
    const a = ac();
    const o = a.createOscillator();
    const g = a.createGain();
    o.connect(g);
    g.connect(a.destination);
    o.type = type;
    o.frequency.setValueAtTime(freqStart, a.currentTime);
    if (freqEnd !== freqStart) {
      o.frequency.exponentialRampToValueAtTime(freqEnd, a.currentTime + duration);
    }
    g.gain.setValueAtTime(volume, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + duration);
    o.start(a.currentTime);
    o.stop(a.currentTime + duration + 0.01);
  } catch(e) {}
}

}

// ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ Game logic ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬
function placeFood() {
  const cells = [];
  for (let c = 0; c < COLS; c++)
    for (let r = 0; r < ROWS; r++)
      if (!snake.some(s => s.x === c && s.y === r))
        cells.push({ x: c, y: r });
  if (!cells.length) return; // no room (win condition)
  food = cells[Math.floor(Math.random() * cells.length)];
  foodSpawnAt = performance.now();
}

function initSnake() {
  const mx = Math.floor(COLS / 2);
  const my = Math.floor(ROWS / 2);
  snake = [
    { x: mx,     y: my },
    { x: mx - 1, y: my },
    { x: mx - 2, y: my },
    { x: mx - 3, y: my },
  ];
  prevSnake = snake.map(s => ({ ...s }));
  dir      = { x: 1, y: 0 };
  prevDir  = { x: 1, y: 0 };
  queueDir = { x: 1, y: 0 };
}

function startGame() {
  if (window.NovarenaSnakeBridge) {
    window.NovarenaSnakeBridge.resetRound();
  }
  score    = 0;
  level    = 1;
  stepMs   = BASE_MS;
  particles = [];
  interpT  = 0;
  initSnake();
  placeFood();
  updateHUD();
  STATE    = 'playing';
  hideOverlay();
  lastStep = performance.now();
  requestAnimationFrame(mainLoop);
}

function pauseGame() {
  if (STATE !== 'playing') return;
  STATE = 'paused';
  renderPauseScreen();
}

function resumeGame() {
  if (STATE !== 'paused') return;
  STATE    = 'playing';
  lastStep = performance.now();
  hideOverlay();
  requestAnimationFrame(mainLoop);
}

function gameOver() {
  STATE = 'gameover';
  sfxGameOver();
  if (window.NovarenaSnakeBridge) {
    window.NovarenaSnakeBridge.submitScore();
  }
  setTimeout(renderGameOverScreen, 500);
}

function stepLogic() {
  prevDir = { ...dir };
  dir = { ...queueDir };
  prevSnake = snake.map(s => ({ ...s }));

  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    gameOver(); return;
  }
  // Self collision (skip very last segment ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â it will have moved)
  for (let i = 0; i < snake.length - 1; i++) {
    if (snake[i].x === head.x && snake[i].y === head.y) {
      gameOver(); return;
    }
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    // Eat!
    score += 10 * level;
    if (score > hiScore) {
      hiScore = score;
      localStorage.setItem('snek_hi', hiScore);
    }
    const newLevel = Math.floor(score / SCORE_PER_LEVEL) + 1;
    if (newLevel > level) level = newLevel;
    stepMs = Math.max(MIN_MS, BASE_MS - (level - 1) * 10);
    spawnParticles(food.x, food.y, 22);
    sfxEat();
    placeFood();
    updateHUD();
  } else {
    snake.pop();
    sfxMove();
  }
  interpT = 0;
}

// ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ Particles ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬
function spawnParticles(col, row, n) {
  const { x: cx, y: cy } = getCellCenter(col, row);
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd   = 1.2 + Math.random() * 3.8;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd * 0.6 - 2.2,
      life: 1,
      decay: 0.022 + Math.random() * 0.028,
      r: 1.5 + Math.random() * 2.5,
      pink: Math.random() > 0.45,
    });
  }
}

function tickParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += 0.14;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ Interpolation ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function easeTurn(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function dirToAngle(v) {
  return Math.atan2(v.y, v.x);
}

function lerpAngle(a, b, t) {
  let diff = b - a;
  while (diff > Math.PI) diff -= Math.PI * 2;
  while (diff < -Math.PI) diff += Math.PI * 2;
  return a + diff * t;
}

function getDisplayDirection() {
  const eased = easeTurn(interpT);
  const angle = lerpAngle(dirToAngle(prevDir), dirToAngle(dir), eased);
  return { x: Math.cos(angle), y: Math.sin(angle), angle };
}

function interpSnake() {
  // Return display positions (fractionally between prevSnake and snake)
  return snake.map((seg, i) => {
    const prev = prevSnake[i] || seg;
    return { x: lerp(prev.x, seg.x, interpT), y: lerp(prev.y, seg.y, interpT) };
  });
}

function getSnakeDisplay() {
  return interpSnake();
}

function drawSkyMotion(maxH = canvas.height) {
  const W = canvas.width, H = maxH;
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, W, H);
  ctx.clip();

  ctx.globalCompositeOperation = 'screen';
  for (const d of SKY_DRIFTS) {
    const t = frameN * d.speed + d.phase;
    const x = W * (0.5 + Math.sin(t) * d.ampX * 0.75);
    const y = H * (0.16 + d.baseY * 0.42 + Math.cos(t * 1.4) * d.ampY * 0.55);
    const rw = W * (0.22 + d.size * 0.32);
    const rh = H * (0.028 + 0.01 * Math.cos(t * 1.1));
    ctx.fillStyle = `rgba(${d.hue},${0.05 + 0.02 * Math.sin(t * 1.9)})`;
    ctx.beginPath();
    ctx.moveTo(-W * 0.1, y + rh);
    ctx.bezierCurveTo(x - rw, y - rh, x - rw * 0.25, y - rh * 1.8, x + rw * 0.12, y - rh * 0.3);
    ctx.bezierCurveTo(x + rw * 0.55, y + rh * 1.1, x + rw, y + rh * 0.35, W * 1.08, y - rh * 0.7);
    ctx.lineTo(W * 1.08, y + rh * 1.8);
    ctx.bezierCurveTo(x + rw * 0.78, y + rh * 2.4, x + rw * 0.3, y + rh * 1.8, x - rw * 0.1, y + rh * 1.2);
    ctx.bezierCurveTo(x - rw * 0.55, y + rh * 0.6, x - rw, y + rh * 1.6, -W * 0.1, y + rh);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

function getGalaxyTexture() {
  if (_galaxyTex) return _galaxyTex;

  const tex = document.createElement('canvas');
  tex.width = 1600;
  tex.height = 900;
  const g = tex.getContext('2d');
  const W = tex.width, H = tex.height;

  const bg = g.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#070714');
  bg.addColorStop(0.45, '#120d2a');
  bg.addColorStop(1, '#04040c');
  g.fillStyle = bg;
  g.fillRect(0, 0, W, H);

  const nebulae = [
    { x: W * 0.22, y: H * 0.28, r: W * 0.22, c0: 'rgba(255,70,170,0.30)', c1: 'rgba(255,70,170,0)' },
    { x: W * 0.64, y: H * 0.2,  r: W * 0.18, c0: 'rgba(90,170,255,0.24)', c1: 'rgba(90,170,255,0)' },
    { x: W * 0.78, y: H * 0.58, r: W * 0.24, c0: 'rgba(0,255,220,0.16)', c1: 'rgba(0,255,220,0)' },
    { x: W * 0.42, y: H * 0.62, r: W * 0.26, c0: 'rgba(170,90,255,0.14)', c1: 'rgba(170,90,255,0)' },
  ];
  for (const n of nebulae) {
    const rg = g.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
    rg.addColorStop(0, n.c0);
    rg.addColorStop(1, n.c1);
    g.fillStyle = rg;
    g.fillRect(n.x - n.r, n.y - n.r, n.r * 2, n.r * 2);
  }

  g.save();
  g.translate(W * 0.56, H * 0.44);
  g.rotate(-0.34);
  for (let i = 0; i < 160; i++) {
    const t = i / 160;
    const ang = t * Math.PI * 5.8;
    const rad = t * W * 0.24;
    const x = Math.cos(ang) * rad;
    const y = Math.sin(ang) * rad * 0.34;
    const size = 1.3 + (1 - t) * 2.8;
    g.fillStyle = `rgba(${t < 0.45 ? '255,240,220' : (t < 0.72 ? '255,120,190' : '120,220,255')},${0.08 + (1 - t) * 0.2})`;
    g.beginPath();
    g.arc(x, y, size, 0, Math.PI * 2);
    g.fill();
  }
  g.restore();

  for (let i = 0; i < 260; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    const s = Math.random() < 0.82 ? 1 : 1.8;
    const a = 0.22 + Math.random() * 0.65;
    g.fillStyle = Math.random() < 0.22 ? `rgba(120,220,255,${a})` : `rgba(255,255,255,${a})`;
    g.fillRect(x, y, s, s);
  }

  const vign = g.createRadialGradient(W * 0.5, H * 0.42, W * 0.12, W * 0.5, H * 0.5, W * 0.74);
  vign.addColorStop(0, 'rgba(0,0,0,0)');
  vign.addColorStop(1, 'rgba(0,0,0,0.46)');
  g.fillStyle = vign;
  g.fillRect(0, 0, W, H);

  _galaxyTex = tex;
  return _galaxyTex;
}

function drawAppleGlyph(cx, cy, scale, pulse, stemTilt = 0.2) {

  ctx.bezierCurveTo(-7.6, 8.6, -11.6, 3.2, -10.5, -2.1);
  ctx.bezierCurveTo(-9.5, -7.2, -5.9, -9.7, -1.2, -6.4);
  ctx.bezierCurveTo(-0.4, -5.8, 0.2, -5.8, 1.1, -6.4);
  ctx.bezierCurveTo(5.8, -9.8, 9.6, -7.2, 10.6, -2.1);
  ctx.bezierCurveTo(11.6, 3.1, 7.6, 8.6, 0, 8.8);
  ctx.closePath();
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.24)';
  ctx.beginPath();
  ctx.ellipse(-3.6, -1.1, 2.2, 3.8, -0.35, 0, Math.PI * 2);

  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0, -5.8);
  ctx.lineTo(Math.sin(stemTilt) * 2.5, -10.2);
  ctx.stroke();

  ctx.save();
  ctx.translate(3.6, -8.8);
  ctx.rotate(-0.48 + stemTilt * 0.45);
  ctx.fillStyle = '#5dff97';
  ctx.beginPath();
  ctx.ellipse(0, 0, 3.6, 1.9, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.24)';
  ctx.beginPath();
  ctx.ellipse(1.1, -0.25, 1.1, 0.55, 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  ctx.restore();
}

// ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ Drawing: background ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬
function drawBackground() {
  if (!_bgGrad) {
    _bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    _bgGrad.addColorStop(0, '#050611');
    _bgGrad.addColorStop(1, '#020308');
  }
  ctx.fillStyle = _bgGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const galaxy = getGalaxyTexture();
  const driftX = Math.sin(frameN * 0.0023) * canvas.width * 0.014;
  const driftY = Math.cos(frameN * 0.0017) * canvas.height * 0.01;
  ctx.globalAlpha = 0.92;
  ctx.drawImage(galaxy, -canvas.width * 0.04 + driftX, -canvas.height * 0.03 + driftY, canvas.width * 1.08, canvas.height * 1.08);
  ctx.globalAlpha = 1;

  drawSkyMotion(canvas.height * 0.42);

  const core = ctx.createRadialGradient(
    canvas.width * 0.56, canvas.height * 0.28, 0,
    canvas.width * 0.56, canvas.height * 0.28, canvas.width * 0.28
  );
  core.addColorStop(0, 'rgba(255,140,220,0.13)');
  core.addColorStop(0.42, 'rgba(100,180,255,0.08)');
  core.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = core;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Stars ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â batch white and cyan separately (2 state changes instead of 55)
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#ffffff';
  for (const s of STARS) {
    if (s.cyan) continue;
    ctx.globalAlpha = s.alpha * (0.5 + 0.5 * Math.sin(frameN * 0.028 + s.phase));
    ctx.fillRect(s.nx * W, s.ny * H, s.size, s.size);
  }
  ctx.fillStyle = '#88ccff';
  for (const s of STARS) {
    if (!s.cyan) continue;
    ctx.globalAlpha = s.alpha * (0.5 + 0.5 * Math.sin(frameN * 0.028 + s.phase));
    ctx.fillRect(s.nx * W, s.ny * H, s.size, s.size);
  }
  ctx.globalAlpha = 1;
}

// ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ Drawing: isometric floor grid ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬
function drawGrid() {
  const lineAlp = 0.16 + 0.06 * Math.sin(gridPhase * 1.4);
  const board = boardMetrics();
  const pulse = 0.5 + 0.5 * Math.sin(gridPhase * 0.9);

  // Tile shading ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â batch even and odd tiles into 2 paths (was 400 individual fills)
  ctx.save();
  ctx.shadowColor = 'rgba(0,255,190,0.16)';
  ctx.shadowBlur = 24;
  ctx.fillStyle = 'rgba(4,18,18,0.82)';
  roundedRectPath(board.x - 10, board.y - 10, board.w + 20, board.h + 20, board.r + 10);
  ctx.fill();
  ctx.restore();

  const boardGrad = ctx.createLinearGradient(board.x, board.y, board.x + board.w, board.y + board.h);
  boardGrad.addColorStop(0, 'rgba(6,36,32,0.95)');
  boardGrad.addColorStop(0.55, 'rgba(7,60,52,0.9)');
  boardGrad.addColorStop(1, 'rgba(4,28,34,0.94)');
  ctx.fillStyle = boardGrad;
  roundedRectPath(board.x, board.y, board.w, board.h, board.r);
  ctx.fill();

  ctx.save();
  roundedRectPath(board.x, board.y, board.w, board.h, board.r);
  ctx.clip();

  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS; r++) {
      const x = board.x + c * CELL;
      const y = board.y + r * CELL;
      const even = (c + r) % 2 === 0;
      ctx.fillStyle = even
        ? `rgba(0,255,170,${0.06 + pulse * 0.035})`
        : `rgba(0,170,255,${0.03 + pulse * 0.02})`;
      ctx.fillRect(x, y, CELL, CELL);
    }
  }

  ctx.strokeStyle = `rgba(160,255,235,${0.12 + pulse * 0.06})`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let c = 1; c < COLS; c++) {
    const x = board.x + c * CELL;
    ctx.moveTo(x, board.y);
    ctx.lineTo(x, board.y + board.h);
  }
  for (let r = 1; r < ROWS; r++) {
    const y = board.y + r * CELL;
    ctx.moveTo(board.x, y);
    ctx.lineTo(board.x + board.w, y);
  }
  ctx.stroke();

  const sweep = ctx.createLinearGradient(board.x, board.y, board.x, board.y + board.h);
  sweep.addColorStop(0, 'rgba(255,255,255,0.16)');
  sweep.addColorStop(0.35, 'rgba(255,255,255,0)');
  sweep.addColorStop(1, 'rgba(0,0,0,0.08)');
  ctx.fillStyle = sweep;
  ctx.fillRect(board.x, board.y, board.w, board.h);
  ctx.restore();

  ctx.shadowColor = 'rgba(0,255,204,0.28)';
  ctx.shadowBlur = 10;
  ctx.strokeStyle = `rgba(0,255,220,${0.44 + pulse * 0.18 + lineAlp * 0.4})`;
  ctx.lineWidth = 2;
  roundedRectPath(board.x, board.y, board.w, board.h, board.r);
  ctx.stroke();
  ctx.shadowBlur = 0;
}

// ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ Drawing: isometric cube ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬
/*
  Cube sits at grid position (col, row).
  Top face:  rhombus centred at iso(col,row)
  Left face: parallelogram dropping from top-left to bottom-left
  Right face: parallelogram dropping from top-right to bottom-right
  h = CUBE_H (vertical drop in screen pixels)
*/
// Unified cube draw ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â glow only applied to head (glowR > 0)
function drawCube(col, row, topCol, leftCol, rightCol, glowCol, glowR) {
  const rect = getCellRect(col, row, CELL * 0.08);
  const radius = Math.max(8, rect.h * 0.32);
  const grad = ctx.createLinearGradient(rect.x, rect.y, rect.x + rect.w, rect.y + rect.h);
  grad.addColorStop(0, topCol);
  grad.addColorStop(1, rightCol);

  if (glowR > 0) {
    ctx.shadowColor = glowCol;
    ctx.shadowBlur  = glowR;
  }

  ctx.fillStyle = grad;
  roundedRectPath(rect.x, rect.y, rect.w, rect.h, radius);
  ctx.fill();

  ctx.strokeStyle = leftCol;
  ctx.lineWidth = 1.5;
  roundedRectPath(rect.x, rect.y, rect.w, rect.h, radius);
  ctx.stroke();

  if (glowR > 0) ctx.shadowBlur = 0;
}

function drawSnakeTileLock(col, row, strength, isHead) {
  const rect = getCellRect(col, row, CELL * 0.16);

  ctx.save();
  ctx.globalAlpha = 0.12 + strength * 0.16;
  ctx.fillStyle = isHead ? 'rgba(0,255,136,1)' : 'rgba(0,210,150,1)';
  roundedRectPath(rect.x, rect.y, rect.w, rect.h, Math.max(8, rect.h * 0.28));
  ctx.fill();

  ctx.globalAlpha = 0.28 + strength * 0.2;
  ctx.strokeStyle = isHead ? 'rgba(180,255,220,1)' : 'rgba(0,255,204,1)';
  ctx.lineWidth = isHead ? 1.8 : 1.15;
  roundedRectPath(rect.x, rect.y, rect.w, rect.h, Math.max(8, rect.h * 0.28));
  ctx.stroke();
  ctx.restore();
}

// ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ Drawing: snake ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬
function drawSnake() {
  const display = getSnakeDisplay();
  const displayDir = getDisplayDirection();
  if (!display.length) return;

  // Draw tailÃƒÂ¢Ã¢â‚¬Â Ã¢â‚¬â„¢head so head is rendered last (on top)
  // Glow only on the head ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â body segments drawn without shadow (huge perf win)
  const points = display.map(seg => getCellCenter(seg.x, seg.y));
  const bodyW = CELL * 0.74;
  const head = points[0];
  const tail = points[points.length - 1];
  const outline = ctx.createLinearGradient(head.x, head.y, tail.x, tail.y);
  outline.addColorStop(0, 'rgba(0,255,180,0.98)');
  outline.addColorStop(0.45, 'rgba(0,220,230,0.95)');
  outline.addColorStop(1, 'rgba(0,110,200,0.88)');
  const inner = ctx.createLinearGradient(head.x, head.y, tail.x, tail.y);
  inner.addColorStop(0, 'rgba(180,255,240,0.92)');
  inner.addColorStop(0.55, 'rgba(20,255,170,0.65)');
  inner.addColorStop(1, 'rgba(0,180,255,0.22)');

  for (let i = Math.min(4, display.length - 1); i >= 0; i--) {
    const bright = 1 - i / Math.max(display.length, 1) * 0.45;
    drawSnakeTileLock(display[i].x, display[i].y, bright, i === 0);
  }

  const traceSnake = () => {
    ctx.beginPath();
    ctx.moveTo(points[points.length - 1].x, points[points.length - 1].y);
    for (let i = points.length - 2; i >= 0; i--) ctx.lineTo(points[i].x, points[i].y);
  };

  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.shadowColor = 'rgba(0,255,170,0.38)';
  ctx.shadowBlur = bodyW * 0.52;
  traceSnake();
  ctx.strokeStyle = 'rgba(0,18,26,0.94)';
  ctx.lineWidth = bodyW + CELL * 0.18;
  ctx.stroke();

  traceSnake();
  ctx.strokeStyle = outline;
  ctx.lineWidth = bodyW;
  ctx.stroke();

  ctx.shadowBlur = 0;
  traceSnake();
  ctx.strokeStyle = inner;
  ctx.lineWidth = bodyW * 0.54;
  ctx.stroke();
  ctx.restore();

  const headPulse = 0.5 + 0.5 * Math.sin(frameN * 0.18);
  ctx.save();
  ctx.shadowColor = '#00ff88';
  ctx.shadowBlur = 18 + headPulse * 12;
  ctx.fillStyle = '#00f0a0';
  ctx.beginPath();
  ctx.ellipse(head.x, head.y, bodyW * 0.52, bodyW * 0.47, dirToAngle(displayDir), 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(180,255,240,0.34)';
  ctx.beginPath();
  ctx.ellipse(
    head.x - displayDir.x * bodyW * 0.08,
    head.y - displayDir.y * bodyW * 0.08,
    bodyW * 0.23, bodyW * 0.17,
    dirToAngle(displayDir), 0, Math.PI * 2
  );
  ctx.fill();
  ctx.restore();

  drawSnakeEyes(head.x, head.y, displayDir);
}

function drawSnakeEyes(cx, cy, facing = dir) {
  const fl = Math.hypot(facing.x, facing.y) || 1;
  const nx = facing.x / fl;
  const ny = facing.y / fl;
  const rx = -ny;
  const ry = nx;
  const anchorX = cx + nx * CELL * 0.12;
  const anchorY = cy + ny * CELL * 0.08;
  const { x: foodX, y: foodY } = getCellCenter(food.x, food.y);
  const gazeX = foodX - cx;
  const gazeY = foodY - cy;
  const gazeL = Math.hypot(gazeX, gazeY) || 1;
  const pupilDX = (gazeX / gazeL) * CELL * 0.045;
  const pupilDY = (gazeY / gazeL) * CELL * 0.045;

  const eyes = [
    { ex: anchorX - rx * CELL * 0.16, ey: anchorY - ry * CELL * 0.16 },
    { ex: anchorX + rx * CELL * 0.16, ey: anchorY + ry * CELL * 0.16 },
  ];

  ctx.save();
  for (const e of eyes) {
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur  = 8;
    ctx.fillStyle   = '#ffffff';
    ctx.beginPath();
    ctx.arc(e.ex, e.ey, CELL * 0.14, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowColor = '#00ff88';
    ctx.shadowBlur  = 5;
    ctx.fillStyle   = '#00ff88';
    ctx.beginPath();
    ctx.arc(e.ex + pupilDX, e.ey + pupilDY, CELL * 0.058, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ Drawing: food ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬
function drawFood() {
  const p       = 0.5 + 0.5 * Math.sin(foodPhase);
  const glowCol = `rgb(255,${Math.floor(90+110*p)},150)`;

  // Ressaltat exacte de la baldosa on ÃƒÆ’Ã‚Â©s el menjar
  const center = getCellCenter(food.x, food.y);
  const rect = getCellRect(food.x, food.y, CELL * 0.11);
  const radius = Math.max(8, rect.h * 0.28);

  // Omplert de la baldosa (pulsant)
  ctx.save();
  ctx.globalAlpha = 0.16 + 0.18 * p;
  ctx.shadowColor = glowCol;
  ctx.shadowBlur = 18;
  ctx.fillStyle = glowCol;
  roundedRectPath(rect.x, rect.y, rect.w, rect.h, radius);
  ctx.fill();

  // Contorn brillant de la baldosa
  ctx.globalAlpha = 0.9;
  ctx.shadowBlur = 0;
  ctx.strokeStyle = `rgba(255,240,244,${0.5 + 0.38 * p})`;
  ctx.lineWidth = 1.6;
  roundedRectPath(rect.x, rect.y, rect.w, rect.h, radius);
  ctx.stroke();

  // Cantonades tipus "target" per remarcar la posiciÃƒÆ’Ã‚Â³
  const tlen = CELL * 0.22;
  ctx.beginPath();
  ctx.moveTo(rect.x + tlen, rect.y);
  ctx.lineTo(rect.x, rect.y);
  ctx.lineTo(rect.x, rect.y + tlen);
  ctx.moveTo(rect.x + rect.w - tlen, rect.y);
  ctx.lineTo(rect.x + rect.w, rect.y);
  ctx.lineTo(rect.x + rect.w, rect.y + tlen);
  ctx.moveTo(rect.x + rect.w - tlen, rect.y + rect.h);
  ctx.lineTo(rect.x + rect.w, rect.y + rect.h);
  ctx.lineTo(rect.x + rect.w, rect.y + rect.h - tlen);
  ctx.moveTo(rect.x + tlen, rect.y + rect.h);
  ctx.lineTo(rect.x, rect.y + rect.h);
  ctx.lineTo(rect.x, rect.y + rect.h - tlen);
  ctx.stroke();
  ctx.restore();

  const bob = Math.sin(foodPhase * 1.8) * CELL * 0.032;
  ctx.save();
  ctx.globalAlpha = 0.22 + 0.12 * p;
  ctx.fillStyle = '#34070f';
  ctx.beginPath();
  ctx.ellipse(center.x, center.y + CELL * 0.12, CELL * 0.22, CELL * 0.14, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  drawAppleGlyph(center.x, center.y - CELL * 0.05 - bob, CELL * 0.06, p, Math.sin(foodPhase) * 0.35);
}

function drawFoodFPS(cx, cz, viewDir, fl) {
  const fp = projFPS(food.x + 0.5, CUBE_GU * 0.7, food.y + 0.5, cx, cz, viewDir);
  if (!fp) return null;
  const p = 0.5 + 0.5 * Math.sin(foodPhase);
  const perspectiveBoost = 1 + clamp((2.6 - fp.d) * 0.42, 0, 1.15);
  const size = clamp((fl * 0.03 * perspectiveBoost) / Math.pow(fp.d, 1.35), 5, 62);
  drawAppleGlyph(fp.sx, fp.sy - size * 0.1, size, p, Math.sin(foodPhase) * 0.35);
  return { ...fp, size };
}

function drawFoodSignalFPS(cx, cz, viewDir, target) {
  const pulse = 0.5 + 0.5 * Math.sin(frameN * 0.22);
  const fresh = clamp(1 - (performance.now() - foodSpawnAt) / 1800, 0, 1);
  const dx = food.x + 0.5 - cx;
  const dz = food.y + 0.5 - cz;
  const fwd = dx * viewDir.x + dz * viewDir.y;
  const rgt = -dx * viewDir.y + dz * viewDir.x;
  const dist = Math.hypot(dx, dz);
  const visible = target && target.sx > 18 && target.sx < canvas.width - 18 &&
    target.sy > 18 && target.sy < canvas.height - 18;

  ctx.save();
  if (visible) {
    const r = target.size * (1.05 + pulse * 0.22 + fresh * 0.25);
    ctx.strokeStyle = `rgba(255,${Math.floor(140 + 60 * pulse)},160,${0.65 + 0.25 * fresh})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(target.sx, target.sy, r, 0, Math.PI * 2);
    ctx.stroke();

    ctx.fillStyle = `rgba(255,230,235,${0.72 + 0.18 * pulse})`;
    ctx.font = `bold ${Math.round(12 + fresh * 3)}px Courier New`;
    ctx.textAlign = 'center';
    ctx.fillText(fresh > 0.08 ? 'NOVA POMA' : 'POMA', target.sx, target.sy - r - 12);
  } else {
    let vx = rgt;
    let vy = fwd < 0.15 ? -1.15 : -0.34;
    const len = Math.hypot(vx, vy) || 1;
    vx /= len; vy /= len;

    const pad = 42;
    const ex = clamp(canvas.width / 2 + vx * (canvas.width * 0.42), pad, canvas.width - pad);
    const ey = clamp(canvas.height * 0.28 + vy * (canvas.height * 0.18), pad, canvas.height - pad);
    const size = 14 + pulse * 6 + fresh * 7;
    const px = -vy, py = vx;

    ctx.fillStyle = `rgba(255,${Math.floor(110 + 90 * pulse)},150,${0.78 + 0.18 * fresh})`;
    ctx.beginPath();
    ctx.moveTo(ex + vx * size * 1.15, ey + vy * size * 1.15);
    ctx.lineTo(ex - vx * size * 0.7 + px * size * 0.65, ey - vy * size * 0.7 + py * size * 0.65);
    ctx.lineTo(ex - vx * size * 0.7 - px * size * 0.65, ey - vy * size * 0.7 - py * size * 0.65);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = 'rgba(255,255,255,0.28)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(ex, ey, size * 1.5, 0, Math.PI * 2);
    ctx.stroke();

    ctx.fillStyle = '#ffeef2';
    ctx.font = `bold ${Math.round(12 + fresh * 3)}px Courier New`;
    ctx.textAlign = 'center';
    ctx.fillText(fwd < 0.15 ? 'POMA AL DARRERE' : (rgt < 0 ? 'POMA A L\'ESQUERRA' : 'POMA A LA DRETA'), ex, ey - size * 2.1);
  }

  ctx.fillStyle = 'rgba(255,240,244,0.72)';
  ctx.font = '11px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(`${dist.toFixed(1)}m`, canvas.width / 2, canvas.height * 0.13);
  ctx.restore();
}

function drawSnakeHeadFPS() {
  const W = canvas.width, H = canvas.height;
  const y0 = H * 0.84;
  const pulse = 0.5 + 0.5 * Math.sin(frameN * 0.16);

  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.fillStyle = 'rgba(0,60,30,0.86)';
  ctx.strokeStyle = `rgba(0,255,136,${0.34 + 0.2 * pulse})`;
  ctx.lineWidth = 2;

  ctx.beginPath();
  ctx.moveTo(W * 0.24, H);
  ctx.quadraticCurveTo(W * 0.29, y0, W * 0.41, H * 0.79);
  ctx.quadraticCurveTo(W * 0.5, H * 0.75, W * 0.59, H * 0.79);
  ctx.quadraticCurveTo(W * 0.71, y0, W * 0.76, H);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = 'rgba(0,255,136,0.16)';
  ctx.beginPath();
  ctx.moveTo(W * 0.33, H);
  ctx.quadraticCurveTo(W * 0.38, H * 0.84, W * 0.46, H * 0.8);
  ctx.quadraticCurveTo(W * 0.5, H * 0.78, W * 0.54, H * 0.8);
  ctx.quadraticCurveTo(W * 0.62, H * 0.84, W * 0.67, H);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = `rgba(255,255,255,${0.45 + 0.18 * pulse})`;
  ctx.beginPath();
  ctx.ellipse(W * 0.43, H * 0.84, W * 0.012, H * 0.01, 0, 0, Math.PI * 2);
  ctx.ellipse(W * 0.57, H * 0.84, W * 0.012, H * 0.01, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = `rgba(0,255,136,${0.65 + 0.2 * pulse})`;
  ctx.beginPath();
  ctx.arc(W * 0.43, H * 0.842, Math.max(1.5, W * 0.0038), 0, Math.PI * 2);
  ctx.arc(W * 0.57, H * 0.842, Math.max(1.5, W * 0.0038), 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ Drawing: particles ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬
function drawParticles() {
  if (!particles.length) return;
  // Batch pink and orange separately ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â no shadowBlur (replaced by alpha fade)
  ctx.shadowBlur = 0;
  ctx.beginPath();
  for (const p of particles) { if (!p.pink) continue; ctx.moveTo(p.x + p.r*p.life, p.y); ctx.arc(p.x, p.y, p.r*p.life, 0, Math.PI*2); }
  ctx.fillStyle = 'rgba(255,60,200,0.9)'; ctx.globalAlpha = 0.85; ctx.fill();

  ctx.beginPath();
  for (const p of particles) { if (p.pink) continue; ctx.moveTo(p.x + p.r*p.life, p.y); ctx.arc(p.x, p.y, p.r*p.life, 0, Math.PI*2); }
  ctx.fillStyle = 'rgba(255,160,0,0.9)'; ctx.fill();
  ctx.globalAlpha = 1;
}

// Replaced with a single semi-transparent overlay ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â much cheaper than N fillRects
function drawScanlines() {

// ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ Drawing: vignette ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬

// ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ BrÃƒÆ’Ã‚Âºixola orientaciÃƒÆ’Ã‚Â³ ISO ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬
// Mostra 4 fletxes apuntant a les direccions visuals reals de cada tecla
function drawISOCompass() {
  const bx = 58, by = canvas.height - 58, r = 30;
  const keys = [
    { label: '\u2191', gx:  0, gy: -1 },
    { label: '\u2193', gx:  0, gy:  1 },
    { label: '\u2192', gx:  1, gy:  0 },
    { label: '\u2190', gx: -1, gy:  0 },
  ];

  ctx.save();
  // Cercle de fons
  ctx.globalAlpha = 0.18;
  ctx.fillStyle = '#00ffcc';
  ctx.beginPath(); ctx.arc(bx, by, r + 14, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;

  for (const k of keys) {
    // DirecciÃƒÆ’Ã‚Â³ visual en pantalla: isoX ÃƒÂ¢Ã‹â€ Ã‚Â (gx-gy), isoY ÃƒÂ¢Ã‹â€ Ã‚Â (gx+gy)*ISO_YS
    const sx = k.gx;
    const sy = k.gy;
    const len = Math.sqrt(sx * sx + sy * sy);
    const nx = sx / len, ny = sy / len;

    // LÃƒÆ’Ã‚Â­nia de la fletxa
    ctx.strokeStyle = 'rgba(0,255,204,0.75)';
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.moveTo(bx + nx * 6, by + ny * 6);
    ctx.lineTo(bx + nx * r, by + ny * r);
    ctx.stroke();

    // Cap de fletxa
    const ax = bx + nx * r, ay = by + ny * r;
    const px = -ny * 4, py = nx * 4;
    ctx.fillStyle = 'rgba(0,255,204,0.75)';
    ctx.beginPath();
    ctx.moveTo(ax + nx * 7, ay + ny * 7);
    ctx.lineTo(ax + px, ay + py);
    ctx.lineTo(ax - px, ay - py);
    ctx.closePath(); ctx.fill();

    // Label de la tecla
    ctx.fillStyle = 'rgba(0,255,204,0.9)';
    ctx.font = 'bold 11px Courier New';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(k.label, bx + nx * (r + 14), by + ny * (r + 14));
  }

  // Punt central
  ctx.fillStyle = '#00ffcc';
  ctx.beginPath(); ctx.arc(bx, by, 3, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

// ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ FPS View ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬
const FPS_H   = 0.68;   // altura cÃƒÆ’Ã‚Â mera en unitats de graella
const CUBE_GU = 0.50;   // altura del cub en unitats de graella

// ProjecciÃƒÆ’Ã‚Â³ perspectiva d'un punt 3D (wx, wy, wz) cap a pantalla
function drawCameraHint() {
  ctx.save();
  ctx.globalAlpha = 0.34;
  ctx.fillStyle = '#00ffcc';
  ctx.font = '11px Courier New';
  ctx.textAlign = 'right';
  ctx.fillText('[ V ] CANVIA CAMERA', canvas.width - 14, canvas.height - 14);
  ctx.restore();
}

function projFPS(wx, wy, wz, cx, cz, viewDir) {
  const dx  = wx - cx, dz = wz - cz;
  const fwd = dx * viewDir.x + dz * viewDir.y;   // profunditat
  if (fwd < 0.08) return null;
  const rgt = -dx * viewDir.y + dz * viewDir.x;  // lateral (dreta = positiu)
  const fl  = canvas.height * 0.88;
  const hz  = canvas.height * 0.40;
  return { sx: canvas.width / 2 + (rgt / fwd) * fl,
           sy: hz + ((FPS_H - wy) / fwd) * fl, d: fwd };
}

// Clip de lÃƒÆ’Ã‚Â­nia al pla proper (near plane) per evitar artefactes
function clipLineFPS(wx1, wz1, wx2, wz2, cx, cz, viewDir) {
  const near = 0.08;
  const f1 = (wx1-cx)*viewDir.x + (wz1-cz)*viewDir.y;
  const f2 = (wx2-cx)*viewDir.x + (wz2-cz)*viewDir.y;
  if (f1 < near && f2 < near) return null;
  let ax=wx1, az=wz1, bx=wx2, bz=wz2;
  if (f1 < near) {
    const t = (near-f1)/(f2-f1);
    ax = wx1+t*(wx2-wx1); az = wz1+t*(wz2-wz1);
  } else if (f2 < near) {
    const t = (near-f1)/(f2-f1);
    bx = wx1+t*(wx2-wx1); bz = wz1+t*(wz2-wz1);
  }
  return { p1: projFPS(ax,0,az,cx,cz,viewDir), p2: projFPS(bx,0,bz,cx,cz,viewDir) };
}

function drawCubeFPS(cube, cx, cz, viewDir) {
  const { gx, gz, top, side, dark, glow, glowR } = cube;
  const ch = cube.ch || CUBE_GU;
  const x0=gx, x1=gx+1, y0=0, y1=ch, z0=gz, z1=gz+1;
  const P = (wx,wy,wz) => projFPS(wx, wy, wz, cx, cz, viewDir);

  const face = (pts, col) => {
    const v = pts.filter(Boolean);
    if (v.length < 3) return;
    if (glowR > 0) { ctx.shadowColor = glow; ctx.shadowBlur = glowR; }
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(v[0].sx, v[0].sy);
    for (let i = 1; i < v.length; i++) ctx.lineTo(v[i].sx, v[i].sy);
    ctx.closePath(); ctx.fill();
    ctx.shadowBlur = 0;
  };

  const b00=P(x0,y0,z0), b10=P(x1,y0,z0), b01=P(x0,y0,z1), b11=P(x1,y0,z1);
  const t00=P(x0,y1,z0), t10=P(x1,y1,z0), t01=P(x0,y1,z1), t11=P(x1,y1,z1);

  if (FPS_H > y1)  face([t00,t10,t11,t01], top);   // cara superior
  if (cz <= z0)    face([b00,t00,t10,b10], side);   // cara frontal Z
  else if(cz>=z1)  face([b01,t01,t11,b11], side);   // cara posterior Z
  if (cx <= x0)    face([b00,t00,t01,b01], dark);   // cara lateral X-
  else if(cx>=x1)  face([b10,t10,t11,b11], dark);   // cara lateral X+
}

function drawSceneFPS() {
  const display = interpSnake();
  const viewDir = getDisplayDirection();
  const hd = display[0];
  const cx = hd.x + 0.5, cz = hd.y + 0.5;
  const hz = canvas.height * 0.40;
  const fl = canvas.height * 0.88;

  // Cel
  const sk = ctx.createLinearGradient(0, 0, 0, hz);
  sk.addColorStop(0, '#020208'); sk.addColorStop(1, '#0c0c20');
  ctx.fillStyle = sk;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawSkyMotion(hz + 10);
  // Terra
  ctx.fillStyle = '#06060e';
  ctx.fillRect(0, hz, canvas.width, canvas.height - hz);

  // Graella del terra (perspectiva)
  ctx.strokeStyle = 'rgba(0,180,255,0.15)';
  ctx.lineWidth   = 0.8;
  ctx.beginPath();
  for (let z = 0; z <= ROWS; z++) {
    const cl = clipLineFPS(0, z, COLS, z, cx, cz, viewDir);
    if (cl?.p1 && cl?.p2) { ctx.moveTo(cl.p1.sx, cl.p1.sy); ctx.lineTo(cl.p2.sx, cl.p2.sy); }
  }
  for (let x = 0; x <= COLS; x++) {
    const cl = clipLineFPS(x, 0, x, ROWS, cx, cz, viewDir);
    if (cl?.p1 && cl?.p2) { ctx.moveTo(cl.p1.sx, cl.p1.sy); ctx.lineTo(cl.p2.sx, cl.p2.sy); }
  }
  ctx.stroke();

  // Vora del camp (murs lÃƒÆ’Ã‚Â­mit ressaltats)
  ctx.strokeStyle = 'rgba(0,255,120,0.35)';
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  for (const [ax,az,bx,bz] of [[0,0,COLS,0],[COLS,0,COLS,ROWS],[COLS,ROWS,0,ROWS],[0,ROWS,0,0]]) {
    const cl = clipLineFPS(ax, az, bx, bz, cx, cz, viewDir);
    if (cl?.p1 && cl?.p2) { ctx.moveTo(cl.p1.sx, cl.p1.sy); ctx.lineTo(cl.p2.sx, cl.p2.sy); }
  }
  ctx.stroke();

  // Indicador de terra del menjar
  const fp = projFPS(food.x+0.5, 0, food.y+0.5, cx, cz, viewDir);
  if (fp) {
    const pulse = 0.5 + 0.5*Math.sin(foodPhase);
    const sz = fl / fp.d * 0.3;
    ctx.fillStyle = `rgba(255,${Math.floor(70+90*pulse)},110,${0.12+0.08*pulse})`;
    ctx.beginPath();
    ctx.ellipse(fp.sx, fp.sy + sz * 0.18, sz * 0.82, sz * 0.42, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Recull cubs: serp + menjar
  const cubes = [];
  for (let i = display.length-1; i >= 0; i--) {
    const s = display[i];
    const frac = i / Math.max(display.length-1, 1);
    const gr = Math.floor(255*(1-frac*0.5)), bl = Math.floor(frac*110);
    cubes.push({
      gx: s.x, gz: s.y, ch: CUBE_GU,
      top:  `rgb(0,${gr},${bl})`,
      side: `rgb(0,${Math.floor(gr*.65)},${Math.floor(bl*.75)})`,
      dark: `rgb(0,${Math.floor(gr*.42)},${Math.floor(bl*.52)})`,
      glow: i===0 ? '#00ff88' : null, glowR: i===0 ? 14 : 0,
    });
  }

  // Pintor: de lluny a prop
  cubes.sort((a,b) => {
    const da=(a.gx+.5-cx)*viewDir.x+(a.gz+.5-cz)*viewDir.y;
    const db=(b.gx+.5-cx)*viewDir.x+(b.gz+.5-cz)*viewDir.y;
    return db-da;
  });
  for (const c of cubes) drawCubeFPS(c, cx, cz, viewDir);
  const appleTarget = drawFoodFPS(cx, cz, viewDir, fl);
  drawFoodSignalFPS(cx, cz, viewDir, appleTarget);

  // PartÃƒÆ’Ã‚Â­cules (2D sobre la vista)
  drawParticles();

  // Mira central
  const mx = canvas.width/2, my = hz;
  ctx.strokeStyle = 'rgba(0,255,136,0.5)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(mx-12,my); ctx.lineTo(mx+12,my);
  ctx.moveTo(mx,my-12); ctx.lineTo(mx,my+12);
  ctx.stroke();

  // Hint
  ctx.globalAlpha = 0.32;
  ctx.fillStyle = '#00ffcc';
  ctx.font = '11px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText('ÃƒÂ¢Ã¢â‚¬Â Ã‚Â GIRA ESQ  ÃƒÂ¢Ã¢â‚¬Â Ã¢â‚¬â„¢  GIRA DRE', 14, canvas.height - 14);
  ctx.globalAlpha = 1;
  drawCameraHint();
}

// ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ Main loop ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬
let loopRunning = false;

function mainLoop(now) {
  if (STATE !== 'playing') { loopRunning = false; return; }
  loopRunning = true;
  requestAnimationFrame(mainLoop);

  frameN++;
  gridPhase += 0.022;
  foodPhase += 0.058;
  scanY     += 0.6;
  updateGridOrigin();

  // Step logic
  if (now - lastStep >= stepMs) {
    stepLogic();
    lastStep = now;
    if (STATE !== 'playing') return; // game over happened
  }
  interpT = Math.min(1, (now - lastStep) / stepMs);

  tickParticles();

  // Render
  if (VIEW === 'fps') {
    drawSceneFPS();
  } else {
    drawBackground();
    drawGrid();
    drawFood();
    drawSnake();
    drawParticles();
    drawScanlines();
    drawVignette();
    drawCameraHint();
  }
}

// Background-only loop for non-playing states
function bgLoop() {
  if (STATE === 'playing') return; // hand off to mainLoop
  frameN++;
  gridPhase += 0.015;
  foodPhase += 0.04;
  scanY     += 0.4;
  updateGridOrigin();

  if (VIEW === 'fps' && STATE === 'paused') {
    drawSceneFPS();
  } else {
    drawBackground();
    drawGrid();
    if (STATE !== 'start') {
      drawFood();
      drawSnake();
      drawParticles();
    }
    drawScanlines();
    drawVignette();
    if (STATE !== 'start') drawCameraHint();
  }

  requestAnimationFrame(bgLoop);
}

// ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ Input ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬ÃƒÂ¢Ã¢â‚¬ÂÃ¢â€šÂ¬
const DIRS = {
  ArrowUp:    { x:  0, y: -1 }, w: { x:  0, y: -1 }, W: { x:  0, y: -1 },
  ArrowDown:  { x:  0, y:  1 }, s: { x:  0, y:  1 }, S: { x:  0, y:  1 },
  ArrowLeft:  { x: -1, y:  0 }, a: { x: -1, y:  0 }, A: { x: -1, y:  0 },
  ArrowRight: { x:  1, y:  0 }, d: { x:  1, y:  0 }, D: { x:  1, y:  0 },
};

document.addEventListener('keydown', e => {
  if (e.key === 'm' || e.key === 'M') { muted = !muted; return; }
  if (e.key === 'v' || e.key === 'V') {
    if (STATE === 'playing' || STATE === 'paused')
      VIEW = VIEW === 'iso' ? 'fps' : 'iso';
    return;
  }

  if (STATE === 'playing') {
    if (e.key === 'p' || e.key === 'P') { pauseGame(); return; }

    // En vista FPS: controls relatius (ÃƒÂ¢Ã¢â‚¬Â Ã‚Â gira esquerra, ÃƒÂ¢Ã¢â‚¬Â Ã¢â‚¬â„¢ gira dreta)
    if (VIEW === 'fps') {
      const isLeft  = e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A';
      const isRight = e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D';
      if (isLeft)  { queueDir = { x:  dir.y, y: -dir.x }; e.preventDefault(); return; }
      if (isRight) { queueDir = { x: -dir.y, y:  dir.x }; e.preventDefault(); return; }
      // Amunt = seguir recte (no fer res), avall = ignorar
      if (e.key.startsWith('Arrow') || 'wasdWASD'.includes(e.key)) { e.preventDefault(); return; }
    }

    const nd = DIRS[e.key];
    if (nd) {
      if (nd.x !== -dir.x || nd.y !== -dir.y) queueDir = nd;
      e.preventDefault();
    }
  } else if (STATE === 'paused') {
    if (e.key === 'p' || e.key === 'P') resumeGame();
  }
});

// Touch swipe
let touchStart0 = null;
document.addEventListener('touchstart', e => {
  const t = e.touches[0];
  touchStart0 = { x: t.clientX, y: t.clientY };
}, { passive: true });
document.addEventListener('touchend', e => {
  if (!touchStart0 || STATE !== 'playing') return;
  const dx = e.changedTouches[0].clientX - touchStart0.x;
  const dy = e.changedTouches[0].clientY - touchStart0.y;
  touchStart0 = null;
  if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return;
  let nd;
  if (Math.abs(dx) > Math.abs(dy)) {
    nd = dx > 0 ? { x:  1, y: 0 } : { x: -1, y: 0 };
  } else {
    nd = dy > 0 ? { x: 0, y:  1 } : { x: 0, y: -1 };
  }
  if (nd.x !== -dir.x || nd.y !== -dir.y) queueDir = nd;
}, { passive: true });
